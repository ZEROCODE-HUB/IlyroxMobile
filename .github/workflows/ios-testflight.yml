name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "CFBundleShortVersionString (ej: 1.0.1)"
        required: false
        type: string
      build_number:
        description: "CFBundleVersion (ej: 2)"
        required: false
        type: string

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      BUNDLE_ID: com.ilyrox.app
      EXTENSION_BUNDLE_ID: com.ilyrox.app.OneSignalNotificationServiceExtension
      APPLE_TEAM_ID: 9BWTN3CAXU
      APPSTORE_ISSUER_ID: 05ec12f7-b988-4093-8849-a3ed039d8705
      APPSTORE_API_KEY_ID: 7TB389LN84
      XCODE_SCHEME: ilyrox
      XCODE_WORKSPACE: ios/ilyrox.xcworkspace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Setup signing assets
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/app_store.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          EXT_PROFILE_PATH="$RUNNER_TEMP/extension_app_store.mobileprovision"
          EXT_PROFILE_PLIST="$RUNNER_TEMP/extension_profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          decode_base64() {
            if base64 --help 2>&1 | grep -q -- "--decode"; then
              base64 --decode
            else
              base64 -D
            fi
          }

          echo -n "$IOS_DISTRIBUTION_CERT_BASE64" | decode_base64 > "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

          if [[ -n "${IOS_EXTENSION_PROVISIONING_PROFILE_BASE64:-}" ]]; then
            echo -n "$IOS_EXTENSION_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$EXT_PROFILE_PATH"
            security cms -D -i "$EXT_PROFILE_PATH" > "$EXT_PROFILE_PLIST"
            EXT_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$EXT_PROFILE_PLIST")
            EXT_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$EXT_PROFILE_PLIST")
            cp "$EXT_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXT_PROFILE_UUID.mobileprovision"
            echo "EXT_PROFILE_UUID=$EXT_PROFILE_UUID" >> "$GITHUB_ENV"
            echo "EXTENSION_PROFILE_NAME=$EXT_PROFILE_NAME" >> "$GITHUB_ENV"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DISTRIBUTION_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          echo "=== Certificados instalados en keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Expo Prebuild
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GOOGLE_MAPS_IOS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_IOS_API_KEY }}
        run: |
          npx expo prebuild --platform ios --non-interactive --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Patch entitlements - remove App Groups (temporal hasta configurar Apple Developer)
        run: |
          set -euo pipefail

          patch_entitlements() {
            local file="$1"
            if [[ ! -f "$file" ]]; then
              echo "⚠️  No encontrado: $file"
              return
            fi
            echo "📄 Contenido antes del patch: $file"
            cat "$file"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$file" 2>/dev/null || true
            echo "✅ App Groups removido de: $file"
            echo "📄 Contenido después del patch:"
            cat "$file"
          }

          patch_entitlements "ios/ilyrox/ilyrox.entitlements"
          patch_entitlements "ios/OneSignalNotificationServiceExtension/OneSignalNotificationServiceExtension.entitlements"

      - name: Validate extension signing profile
        run: |
          set -euo pipefail
          if grep -q "OneSignalNotificationServiceExtension" ios/*.xcodeproj/project.pbxproj; then
            if [[ -z "${EXTENSION_PROFILE_NAME:-}" ]]; then
              echo "❌ Se detecto OneSignalNotificationServiceExtension, pero falta secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64"
              exit 1
            fi
          fi

      - name: Configure manual signing per target
        env:
          PBXPROJ: ios/ilyrox.xcodeproj/project.pbxproj
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          pbxproj_path     = ENV['PBXPROJ']
          profile_name     = ENV['PROFILE_NAME']           || ''
          profile_uuid     = ENV['PROFILE_UUID']           || ''
          ext_profile_name = ENV['EXTENSION_PROFILE_NAME'] || ''
          ext_profile_uuid = ENV['EXT_PROFILE_UUID']       || ''

          content = File.read(pbxproj_path)

          # 1. Force Manual signing everywhere
          content.gsub!(/CODE_SIGN_STYLE = Automatic/, 'CODE_SIGN_STYLE = Manual')

          # 2. Normalize code sign identity
          content.gsub!(/CODE_SIGN_IDENTITY = "iPhone Developer"/,    'CODE_SIGN_IDENTITY = "Apple Distribution"')
          content.gsub!(/CODE_SIGN_IDENTITY = "iPhone Distribution"/, 'CODE_SIGN_IDENTITY = "Apple Distribution"')
          content.gsub!(/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = ".*?"/, '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution"')

          # 3. Per-target PROVISIONING_PROFILE_SPECIFIER injection.
          #
          #    CRITICAL FIX: expo prebuild with Automatic signing does NOT write
          #    PROVISIONING_PROFILE_SPECIFIER into the pbxproj. The previous script
          #    only replaced existing values (.sub), so it was a no-op.
          #    This version INJECTS the key when it is absent from the block.

          lines  = content.lines
          result = []
          in_build_settings = false
          brace_depth       = 0
          current_bundle_id = nil
          block_lines       = []

          lines.each do |line|
            if line =~ /buildSettings\s*=\s*\{/
              in_build_settings = true
              brace_depth       = 1
              current_bundle_id = nil
              block_lines       = [line]
              next
            end

            if in_build_settings
              brace_depth  += line.count('{') - line.count('}')
              block_lines  << line

              if line =~ /PRODUCT_BUNDLE_IDENTIFIER\s*=\s*"?([^";]+)"?\s*;/
                current_bundle_id = $1.strip.delete('"')
              end

              if brace_depth <= 0
                is_ext         = current_bundle_id&.include?('OneSignalNotificationServiceExtension')
                target_profile = is_ext ? ext_profile_name : profile_name
                target_uuid    = is_ext ? ext_profile_uuid  : profile_uuid

                has_specifier = block_lines.any? { |l| l =~ /PROVISIONING_PROFILE_SPECIFIER/ }
                has_profile   = block_lines.any? { |l| l =~ /PROVISIONING_PROFILE\s*=/ && l !~ /SPECIFIER/ }

                # Replace values that already exist
                patched_block = block_lines.map do |bl|
                  if bl =~ /PROVISIONING_PROFILE_SPECIFIER/
                    bl.sub(/PROVISIONING_PROFILE_SPECIFIER\s*=\s*"[^"]*"/, "PROVISIONING_PROFILE_SPECIFIER = \"#{target_profile}\"")
                      .sub(/PROVISIONING_PROFILE_SPECIFIER\s*=\s*;/,       "PROVISIONING_PROFILE_SPECIFIER = \"#{target_profile}\";")
                  elsif bl =~ /PROVISIONING_PROFILE\s*=/ && bl !~ /SPECIFIER/
                    bl.sub(/PROVISIONING_PROFILE\s*=\s*"[^"]*"/, "PROVISIONING_PROFILE = \"#{target_uuid}\"")
                  else
                    bl
                  end
                end

                # INJECT missing keys just before the closing `};` of the block
                closing_idx = patched_block.rindex { |l| l =~ /^\s*\};\s*$/ }
                if closing_idx && !target_profile.empty?
                  indent     = "\t\t\t\t"
                  injections = []
                  injections << "#{indent}PROVISIONING_PROFILE = \"#{target_uuid}\";\n"             unless has_profile
                  injections << "#{indent}PROVISIONING_PROFILE_SPECIFIER = \"#{target_profile}\";\n" unless has_specifier
                  patched_block.insert(closing_idx, *injections) unless injections.empty?
                end

                result.concat(patched_block)
                in_build_settings = false
                current_bundle_id = nil
                block_lines       = []
                next
              end

              next
            end

            result << line
          end

          result.concat(block_lines) unless block_lines.empty?

          File.write(pbxproj_path, result.join)
          puts "✅ Manual signing configured per target in #{pbxproj_path}"
          RUBY

          echo "=== Signing settings después del patch ==="
          grep -n "CODE_SIGN_STYLE\|CODE_SIGN_IDENTITY\|PROVISIONING_PROFILE_SPECIFIER\|PROVISIONING_PROFILE\b\|PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" | head -100

      - name: Resolve workspace and scheme
        run: |
          set -euo pipefail

          WORKSPACE_PATH="${XCODE_WORKSPACE:-}"
          if [[ -z "$WORKSPACE_PATH" || ! -f "$WORKSPACE_PATH" ]]; then
            WORKSPACE_PATH="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          fi

          if [[ -z "$WORKSPACE_PATH" ]]; then
            echo "❌ No se encontro .xcworkspace en ios/"
            exit 1
          fi

          SCHEME_NAME="${XCODE_SCHEME:-}"
          if [[ -z "$SCHEME_NAME" ]]; then
            SCHEME_NAME="$(xcodebuild -list -workspace "$WORKSPACE_PATH" | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' | sed 's/^[[:space:]]*//' | head -n 1)"
          fi

          if [[ -z "$SCHEME_NAME" ]]; then
            echo "❌ No se pudo resolver XCODE_SCHEME para $WORKSPACE_PATH"
            exit 1
          fi

          echo "XCODE_WORKSPACE=$WORKSPACE_PATH" >> "$GITHUB_ENV"
          echo "XCODE_SCHEME=$SCHEME_NAME" >> "$GITHUB_ENV"
          echo "✅ Workspace: $WORKSPACE_PATH"
          echo "✅ Scheme: $SCHEME_NAME"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create ExportOptions.plist
        run: |
          set -euo pipefail
          EXPORT_OPTIONS_PATH="$RUNNER_TEMP/ExportOptions.plist"
          EXTENSION_PROFILE_XML=""
          if [[ -n "${EXTENSION_PROFILE_NAME:-}" ]]; then
            EXTENSION_PROFILE_XML="
              <key>${EXTENSION_BUNDLE_ID}</key>
              <string>${EXTENSION_PROFILE_NAME}</string>"
          fi
          cat > "$EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
              ${EXTENSION_PROFILE_XML}
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          echo "✅ ExportOptions.plist generado:"
          cat "$EXPORT_OPTIONS_PATH"
          echo "EXPORT_OPTIONS_PATH=$EXPORT_OPTIONS_PATH" >> "$GITHUB_ENV"

      - name: Resolve build version
        run: |
          set -euo pipefail
          BUILD_NAME="${{ github.event.inputs.build_name }}"
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"

          if [[ -z "$BUILD_NAME" ]]; then
            BUILD_NAME=$(node -e "const {execSync}=require('child_process'); try { const out=execSync('npx expo config --type public --json',{stdio:['ignore','pipe','ignore']}).toString(); const cfg=JSON.parse(out); console.log(cfg.version || '1.0.0'); } catch (e) { try { const a=require('./app.json'); console.log((a.expo && a.expo.version) || a.version || '1.0.0'); } catch (e2) { console.log('1.0.0'); } }")
          fi
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER=$(date +%Y%m%d%H%M)
          fi

          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "✅ Version: $BUILD_NAME ($BUILD_NUMBER)"

      - name: Build Archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/ilyrox.xcarchive"
          LOG_PATH="$RUNNER_TEMP/xcodebuild-archive.log"

          set +e
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            MARKETING_VERSION="$BUILD_NAME" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            NODE_BINARY="$(which node)" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SKIP_INSTALL=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee "$LOG_PATH"
          XCODE_STATUS=${PIPESTATUS[0]}
          set -e

          if [[ "$XCODE_STATUS" -ne 0 ]]; then
            echo ""
            echo "========================================"
            echo "ARCHIVE FAILED — ULTIMAS 150 LINEAS"
            echo "========================================"
            tail -n 150 "$LOG_PATH"
            echo ""
            echo "========================================"
            echo "BUSQUEDA AMPLIA DE ERRORES"
            echo "========================================"
            grep -in "error\|fail\|invalid\|cannot\|missing\|codesign\|profile\|entitlement\|provisioning" "$LOG_PATH" | grep -v "^note:" | tail -n 80 || true
            exit "$XCODE_STATUS"
          fi

          echo "✅ Archive generado: $ARCHIVE_PATH"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          set -euo pipefail
          IPA_DIR="$RUNNER_TEMP/ipa"
          mkdir -p "$IPA_DIR"

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            | xcpretty

          IPA_PATH=$(find "$IPA_DIR" -maxdepth 1 -name "*.ipa" | head -n 1)
          if [[ -z "$IPA_PATH" ]]; then
            echo "❌ No se encontró ningún .ipa en $IPA_DIR"
            exit 1
          fi
          echo "✅ IPA generado: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ env.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ env.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}