workflows:
  ios-release:
    name: iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - signing # Create this group in CodeMagic UI for certificates/profiles
      vars:
        XCODE_WORKSPACE: "ios/ilyrox.xcworkspace"
        XCODE_SCHEME: "ilyrox"
        APP_ID: "com.ilyrox.app"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Set up code signing settings
        script: |
          keychain add-certificates
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios
      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - user@example.com # Replace with your email
        notify:
          success: true
          failure: true
