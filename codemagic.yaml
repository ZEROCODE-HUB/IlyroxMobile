workflows:
  ios-release:
    name: iOS Production Build & App Store Upload
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - ios-signing # Group for Certificates and Profiles in CodeMagic
        - app-store-credentials # Group for App Store Connect API Key
      vars:
        XCODE_WORKSPACE: "ios/ilyrox.xcworkspace"
        XCODE_SCHEME: "ilyrox"
        APP_ID: "com.ilyrox.app" # iOS Bundle Identifier
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up code signing settings
        script: |
          keychain add-certificates
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios
      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ffabian.m@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration # Requires App Store Connect integration enabled in CodeMagic settings
        submit_to_testflight: true # Automatically uploads to TestFlight
        submit_to_app_store: false # Set to true only for final automated submission
